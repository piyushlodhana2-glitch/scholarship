<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IIT Delhi - Master Scholarship Eligibility Portal</title>
    <style>
        :root {
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --bg-main: #060b19;
            --bg-card: rgba(15, 23, 42, 0.65);
            --primary-blue: #3b82f6;
            --accent-gold: #f59e0b;
            --success-green: #10b981;
            --text-light: #f8fafc;
            --text-muted: #64748b;
            --border-glass: rgba(255, 255, 255, 0.07);
            --glow-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-main);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .app-container {
            width: 100%;
            max-width: 1150px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 28px;
            border-radius: 50px;
            border: 1px solid var(--border-glass);
            box-shadow: var(--glow-shadow);
        }

        .header-logo {
            font-size: 1.3rem;
            font-weight: 900;
            background: linear-gradient(45deg, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-stats {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
        }

        .portal-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 850px) {
            .portal-grid {
                grid-template-columns: 380px 1fr;
            }
        }

        .profile-card {
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--glow-shadow);
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: fit-content;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-gold);
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 8px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .match-count-badge {
            font-size: 0.8rem;
            background: var(--primary-blue);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #cbd5e1;
        }

        .form-group select, .form-group input {
            background: rgba(10, 15, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group select:focus, .form-group input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.25);
        }

        /* Prevent HTML5 number input from showing spinner arrows on webkit */
        .form-group input[type=number]::-webkit-inner-spin-button, 
        .form-group input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .btn-check {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-check:active {
            transform: scale(0.97);
        }

        .results-card {
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--glow-shadow);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .results-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 720px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .results-list::-webkit-scrollbar {
            width: 6px;
        }
        .results-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .sch-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .sch-item:hover {
            transform: translateX(4px);
            border-color: rgba(59, 130, 246, 0.3);
            background: rgba(255, 255, 255, 0.03);
        }

        .sch-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .sch-title {
            font-size: 1.05rem;
            font-weight: 800;
            color: #ffffff;
        }

        .sch-value {
            font-size: 0.8rem;
            font-weight: 800;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
            padding: 4px 10px;
            border-radius: 8px;
            white-space: nowrap;
        }

        .meta-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 6px;
        }

        .tag-crit { background: rgba(245, 158, 11, 0.08); color: var(--accent-gold); border: 1px solid rgba(245, 158, 11, 0.2); }
        .tag-dept { background: rgba(147, 51, 234, 0.08); color: #c084fc; border: 1px solid rgba(147, 51, 234, 0.2); }

        .sch-desc {
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.5;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
            border: 1px dashed var(--border-glass);
            border-radius: 16px;
        }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="app-container">
    <div class="app-header">
        <div class="header-logo">🏛️ IITD Scholarship Portal</div>
        <div class="header-stats">Database Loaded: <span id="dbCount">0</span> Grants</div>
    </div>

    <div class="portal-grid">
        <div class="profile-card">
            <div class="section-title">Academic Profile</div>
            
            <div class="form-group">
                <label for="degree">Degree Stream</label>
                <select id="degree">
                    <option value="UG">B.Tech / Dual Degree / UG</option>
                    <option value="PG">M.Tech / M.Sc / PG</option>
                </select>
            </div>

            <div class="form-group">
                <label for="year">Year of Enrollment</label>
                <select id="year">
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                    <option value="5">5th Year</option>
                </select>
            </div>

            <div class="form-group">
                <label for="department">Academic Department</label>
                <select id="department">
                    <option value="ANY">Open to All Departments</option>
                    <option value="EE">Electrical Engineering</option>
                    <option value="ME">Mechanical Engineering</option>
                    <option value="TT">Textile & Fibre Technology</option>
                    <option value="CE">Civil Engineering</option>
                    <option value="CSE">Computer Science & Engineering</option>
                </select>
            </div>

            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender">
                    <option value="ANY">Any Gender Identity</option>
                    <option value="Female">Female</option>
                    <option value="Male">Male</option>
                </select>
            </div>

            <div class="form-group">
                <label for="category">Category Classification</label>
                <select id="category">
                    <option value="GEN">General / OBC / EWS</option>
                    <option value="SC">Scheduled Caste (SC)</option>
                    <option value="ST">Scheduled Tribe (ST)</option>
                    <option value="PwD">Persons with Disabilities (PwD)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="income">Annual Family Income (in ₹)</label>
                <input type="number" id="income" placeholder="e.g. 550000" value="500000">
            </div>

            <div class="form-group">
                <label for="cgpa">Current Cumulative CGPA</label>
                <input type="number" id="cgpa" step="0.1" min="0" max="10" value="8.0">
            </div>

            <button class="btn-check" onclick="evaluateScholarships()">Check for Eligible scholarship</button>
        </div>

        <div class="results-card">
            <div class="section-title">
                Matches Found 
                <span class="match-count-badge" id="matchCounter">0</span>
            </div>
            <div class="results-list" id="resultsWrapper"></div>
        </div>
    </div>
</div>

<script>
const MASTER_SCHOLARSHIP_DB = [
    {
        name: "Merit-cum-Means (MCM) Scholarship",
        amount: "₹4,000 / Month + Full Tuition Fee Waiver",
        desc: "Standard institutional merit-cum-means assistance matching up to 25% of absolute undergraduate enrollment capacity whose annual family income is up to Rs. 8 Lakhs.",
        rules: { degree: ["UG"], maxIncome: 800000, minCgpa: 6.0, category: ["GEN"] }
    },
    {
        name: "Institute Free Studentship",
        amount: "Tuition Fee Exemption",
        desc: "Fallback financial tuition waiver allocation for students outside standard MCM capacity saturation metrics on the basis of means alone.",
        rules: { degree: ["UG"], maxIncome: 800000, minCgpa: 0 }
    },
    {
        name: "SC/ST Full Tuition Exemption",
        amount: "100% Tuition Fee Waiver",
        desc: "Automatic systemic structural fee exemption applied across all eligible SC/ST/PwD student pathways irrespective of parents' or guardians' income.",
        rules: { category: ["SC", "ST", "PwD"] }
    },
    {
        name: "Free Messing and Pocket Allowance",
        amount: "Free Catering + ₹1,000 / Month",
        desc: "Welfare scheme allocated specifically to lower-income structural brackets (family income less than Rs. 8 Lakhs) within the SC and ST categories.",
        rules: { category: ["SC", "ST"], maxIncome: 800000 }
    },
    {
        name: "Class of 1984 Batch Endowment Scholarship",
        amount: "Full Ride Waiver",
        desc: "Instituted by the historic 1984 batch for a top ranking student whose home threshold runs beneath 8L.",
        rules: { degree: ["UG"], maxIncome: 800000 }
    },
    {
        name: "Class of 1992 Memorial Grant",
        amount: "Flexi Tuition Support",
        desc: "Targeting undergraduate engineering paths with evaluated financial indices situated precisely between 4.5 and 9 Lakhs.",
        rules: { degree: ["UG"], minIncome: 450000, maxIncome: 900000 }
    },
    {
        name: "Budhwanti Mrig Memorial Educational Scholarship",
        amount: "₹1,00,000 / Year",
        desc: "Exclusively awarded to exceptional, incoming first-year female engineering candidates.",
        rules: { degree: ["UG"], targetYears: [1], gender: ["Female"], maxIncome: 900000 }
    },
    {
        name: "ABB Donor Scholarship",
        amount: "₹25,000 / Year",
        desc: "Specialized corporate donor grant running across Electrical Engineering power/automation pipelines.",
        rules: { degree: ["UG"], targetYears: [2], minCgpa: 7.5, department: ["EE"] }
    },
    {
        name: "Akshat Gupta Scholarship",
        amount: "₹50,000 / Year",
        desc: "Awarded to second year UG students demonstrating a mix of robust academics alongside targeted financial assistance paths.",
        rules: { degree: ["UG"], targetYears: [2], minCgpa: 6.0, maxIncome: 450000 }
    },
    {
        name: "Class of 1974 Electrical Engineering Female Grant",
        amount: "Full Tuition Coverage",
        desc: "Endowed specifically to support female engineering students inside the Electrical department track.",
        rules: { degree: ["UG"], gender: ["Female"], department: ["EE"], maxIncome: 900000 }
    },
    {
        name: "Dalmia Scholarship Program (Nilgiri & Mechanical Tracks)",
        amount: "Up to ₹1,00,000 / Year",
        desc: "Generously supported by Mr. Raghu Hari Dalmia to benefit undergraduate students in Mechanical Engineering or residing in Nilgiri Hostel.",
        rules: { degree: ["UG"], maxIncome: 800000, department: ["ME", "ANY"] }
    }
];

document.getElementById("dbCount").innerText = MASTER_SCHOLARSHIP_DB.length;

function evaluateScholarships() {
    const userDegree = document.getElementById("degree").value;
    const userYear = parseInt(document.getElementById("year").value);
    const userDept = document.getElementById("department").value;
    const userGender = document.getElementById("gender").value;
    const userCat = document.getElementById("category").value;
    
    // MODIFIED: Read numerical value accurately out of direct field entry
    const userIncome = parseFloat(document.getElementById("income").value) || 0;
    const userCgpa = parseFloat(document.getElementById("cgpa").value) || 0;

    const wrapper = document.getElementById("resultsWrapper");
    wrapper.innerHTML = "";
    let matchesFound = 0;

    MASTER_SCHOLARSHIP_DB.forEach(item => {
        const r = item.rules;

        if (r.degree && !r.degree.includes(userDegree)) return;
        if (r.targetYears && !r.targetYears.includes(userYear)) return;
        if (r.gender && r.gender !== "ANY" && !r.gender.includes(userGender)) return;
        if (r.category && !r.category.includes(userCat)) return;
        if (r.department && userDept !== "ANY" && !r.department.includes(userDept)) return;
        if (r.minCgpa && userCgpa < r.minCgpa) return;
        if (r.maxIncome && userIncome > r.maxIncome) return;
        if (r.minIncome && userIncome < r.minIncome) return;

        matchesFound++;
        const card = document.createElement("div");
        card.className = "sch-item";
        card.innerHTML = `
            <div class="sch-header">
                <div class="sch-title">${item.name}</div>
                <div class="sch-value">${item.amount}</div>
            </div>
            <div class="meta-tags">
                <span class="tag tag-crit">🎯 Cutoff/GPA: ${r.minCgpa || "Passing Status"}</span>
                <span class="tag tag-dept">🏢 Stream: ${userDept === "ANY" ? "Open Bracket" : userDept}</span>
            </div>
            <div class="sch-desc">${item.desc}</div>
        `;
        wrapper.appendChild(card);
    });

    document.getElementById("matchCounter").innerText = matchesFound;

    if (matchesFound === 0) {
        wrapper.innerHTML = `
            <div class="empty-state">
                No matching donor grants found for your specified data metrics. Adjust parameters or optimize performance filters to broaden your search pattern.
            </div>`;
    }
}

evaluateScholarships();

/* ==========================================================
   PARTICLE MESH BACKGROUND ENGINE
   ========================================================== */
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

for (let i = 0; i < 45; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 2.5 + 0.5,
        alpha: Math.random() * 0.5 + 0.1,
        speed: Math.random() * 0.15 + 0.05
    });
}

function animateBackgroundMesh() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#060b19');
    grad.addColorStop(1, '#0c152b');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < particles.length; i++) {
        let p = particles[i];
        p.y -= p.speed;
        if (p.y < -10) {
            p.y = canvas.height + 10;
            p.x = Math.random() * canvas.width;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(96, 165, 250, ${p.alpha})`;
        ctx.fill();
    }
    requestAnimationFrame(animateBackgroundMesh);
}
animateBackgroundMesh();
</script>
</body>
</html>
