<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IIT Delhi Scholarship Eligibility Portal</title>
    <style>
        :root {
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --bg-main: #060b19;
            --bg-card: rgba(15, 23, 42, 0.65);
            --primary-blue: #3b82f6;
            --accent-gold: #f59e0b;
            --success-green: #10b981;
            --text-light: #f8fafc;
            --text-muted: #64748b;
            --border-glass: rgba(255, 255, 255, 0.07);
            --glow-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-main);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px; 
            overflow-x: hidden;
            position: relative;
        }

        /* Scaled up desktop padding */
        @media (min-width: 768px) {
            body {
                padding: 24px;
            }
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .app-container {
            width: 100%;
            max-width: 1150px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 10;
        }

        @media (min-width: 768px) {
            .app-container {
                gap: 20px;
            }
        }

        
        .app-header {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-start;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 20px;
            border-radius: 20px;
            border: 1px solid var(--border-glass);
            box-shadow: var(--glow-shadow);
        }

        @media (min-width: 480px) {
            .app-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                border-radius: 50px;
                padding: 16px 28px;
            }
        }

        .header-logo {
            font-size: 1.15rem;
            font-weight: 900;
            background: linear-gradient(45deg, #60a5fa, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (min-width: 768px) {
            .header-logo {
                font-size: 1.3rem;
            }
        }

        .header-stats {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: left;
        }

        @media (min-width: 480px) {
            .header-stats {
                text-align: right;
            }
        }

        
        .portal-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        
        @media (min-width: 850px) {
            .portal-grid {
                grid-template-columns: 380px 1fr;
                gap: 20px;
            }
        }

        .profile-card {
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--glow-shadow);
            display: flex;
            flex-direction: column;
            gap: 14px;
            height: fit-content;
        }

        @media (min-width: 768px) {
            .profile-card {
                border-radius: 24px;
                padding: 24px;
                gap: 16px;
                position: sticky; 
                top: 24px;
            }
        }

        .section-title {
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-gold);
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 8px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        @media (min-width: 768px) {
            .section-title {
                font-size: 1.1rem;
            }
        }

        .match-count-badge {
            font-size: 0.75rem;
            background: var(--primary-blue);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #cbd5e1;
        }

        @media (min-width: 768px) {
            .form-group label {
                font-size: 0.85rem;
            }
        }

        .form-group select, .form-group input {
            background: rgba(10, 15, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
            width: 100%; 
        }

        .form-group select:focus, .form-group input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.25);
        }

        .form-group input[type=number]::-webkit-inner-spin-button, 
        .form-group input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        .btn-check {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            width: 100%;
        }

        @media (min-width: 768px) {
            .btn-check {
                font-size: 1rem;
            }
        }

        .btn-check:active {
            transform: scale(0.98);
        }

        .results-card {
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--glow-shadow);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        @media (min-width: 768px) {
            .results-card {
                border-radius: 24px;
                padding: 24px;
            }
        }

        .results-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: none; 
            overflow-y: visible;
            padding-right: 0;
        }

        @media (min-width: 850px) {
            .results-list {
                max-height: 720px; 
                overflow-y: auto;
                padding-right: 4px;
            }
        }

        .results-list::-webkit-scrollbar {
            width: 6px;
        }
        .results-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .sch-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        @media (min-width: 768px) {
            .sch-item {
                padding: 18px;
                gap: 8px;
            }
            .sch-item:hover {
                transform: translateX(4px);
                border-color: rgba(59, 130, 246, 0.3);
                background: rgba(255, 255, 255, 0.03);
            }
        }

        
        .sch-header {
            display: flex;
            flex-direction: column-reverse;
            align-items: flex-start;
            gap: 8px;
        }

        @media (min-width: 480px) {
            .sch-header {
                flex-direction: row;
                justify-content: space-between;
                align-items: flex-start;
                gap: 12px;
            }
        }

        .sch-title {
            font-size: 0.95rem;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.4;
        }

        @media (min-width: 768px) {
            .sch-title {
                font-size: 1.05rem;
            }
        }

        .sch-value {
            font-size: 0.75rem;
            font-weight: 800;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
            padding: 4px 10px;
            border-radius: 8px;
            white-space: nowrap;
            display: inline-block;
        }

        .meta-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 6px;
        }

        @media (min-width: 768px) {
            .tag {
                font-size: 0.75rem;
            }

        .tag-dept { background: rgba(147, 51, 234, 0.08); color: #c084fc; border: 1px solid rgba(147, 51, 234, 0.2); }

            font-size: 0.8rem;
            color: #94a3b8;
            line-height: 1.5;
        }

        @media (min-width: 768px) {
            .sch-desc {
                font-size: 0.85rem;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
            border: 1px dashed var(--border-glass);
            border-radius: 16px;
        }
    </style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="app-container">
    <div class="app-header">
        <div class="header-logo">🏛️ IITD Scholarship Portal</div>
        <div class="header-stats">Scholarships on portal: <span id="dbCount">0</span></div>
    </div>

    <div class="portal-grid">
        <div class="profile-card">
            <div class="section-title">Academic Profile</div>
            
            <div class="form-group">
                <label for="degree">Degree Stream</label>
                <select id="degree">
                    <option value="UG">B.Tech / Dual Degree</option>
                    <option value="PG">M.Tech / M.Sc</option>
                </select>
            </div>

            <div class="form-group">
                <label for="year">Curreny Year of Study</label>
                <select id="year">
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                    <option value="5">5th Year</option>
                </select>
            </div>

            <div class="form-group">
                <label for="department">Academic Department</label>
                <select id="department">
                    <option value="ANY">Open to All Departments</option>
                    <option value="EE">Only for Electrical Engineering</option>
                    <option value="ME">Only for Mechanical Engineering</option>
                    <option value="TT">Only for Textile & Fibre Technology</option>
                    <option value="CE">Only for Civil Engineering</option>
                    <option value="CSE">Only for Computer Science & Engineering</option>
                </select>
            </div>

            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender">
                    <option value="ANY">Any Gender Identity</option>
                    <option value="Female">Only for Female</option>
                    <option value="Male">Only for Male</option>
                </select>
            </div>

            <div class="form-group">
                <label for="category">Category Classification</label>
                <select id="category">
                    <option value="GEN">General / OBC / EWS</option>
                    <option value="SC">Scheduled Caste (SC)</option>
                    <option value="ST">Scheduled Tribe (ST)</option>
                    <option value="PwD">Persons with Disabilities (PwD)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="income">Annual Family Income (in ₹)</label>
                <input type="number" id="income" placeholder="e.g. 550000" value="500000">
            </div>

            <div class="form-group">
                <label for="cgpa">Current CGPA</label>
                <input type="number" id="cgpa" step="0.1" min="0" max="10" value="8.0">
            </div>

            <button class="btn-check" onclick="evaluateScholarships()">Check for Eligible scholarship</button>
        </div>

        <div class="results-card">
            <div class="section-title">
                Matches Found 
                <span class="match-count-badge" id="matchCounter">0</span>
            </div>
            <div class="results-list" id="resultsWrapper"></div>
        </div>
    </div>
</div>

function evaluateScholarships() {
    const userDegree = document.getElementById("degree").value;
    const userYear = parseInt(document.getElementById("year").value);
    const userDept = document.getElementById("department").value;
    const userGender = document.getElementById("gender").value;
    const userCat = document.getElementById("category").value;
    
    // MODIFIED: Read numerical value accurately out of direct field entry
    const userIncome = parseFloat(document.getElementById("income").value) || 0;
    const userCgpa = parseFloat(document.getElementById("cgpa").value) || 0;

    const wrapper = document.getElementById("resultsWrapper");
    wrapper.innerHTML = "";
    let matchesFound = 0;

    MASTER_SCHOLARSHIP_DB.forEach(item => {
        const r = item.rules;

        if (r.degree && !r.degree.includes(userDegree)) return;
        if (r.targetYears && !r.targetYears.includes(userYear)) return;
        if (r.gender && r.gender !== "ANY" && !r.gender.includes(userGender)) return;
        if (r.category && !r.category.includes(userCat)) return;
        if (r.department && userDept !== "ANY" && !r.department.includes(userDept)) return;
        if (r.minCgpa && userCgpa < r.minCgpa) return;
        if (r.maxIncome && userIncome > r.maxIncome) return;
        if (r.minIncome && userIncome < r.minIncome) return;

        matchesFound++;
        const card = document.createElement("div");
        card.className = "sch-item";
        card.innerHTML = `
            <div class="sch-header">
                <div class="sch-title">${item.name}</div>
                <div class="sch-value">${item.amount}</div>
            </div>
            <div class="meta-tags">
                <span class="tag tag-crit">🎯 Cutoff/GPA: ${r.minCgpa || "Passing Status"}</span>
                <span class="tag tag-dept">🏢 Stream: ${userDept === "ANY" ? "Open Bracket" : userDept}</span>
            </div>
            <div class="sch-desc">${item.desc}</div>
        `;
        wrapper.appendChild(card);
    });

    document.getElementById("matchCounter").innerText = matchesFound;

    if (matchesFound === 0) {
        wrapper.innerHTML = `
            <div class="empty-state">
                No matching scholarships for you!!
            </div>`;
    }
}

evaluateScholarships();

/* ==========================================================
   PARTICLE MESH BACKGROUND ENGINE
   ========================================================== */
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

for (let i = 0; i < 45; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 2.5 + 0.5,
        alpha: Math.random() * 0.5 + 0.1,
        speed: Math.random() * 0.15 + 0.05
    });
}

function animateBackgroundMesh() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#060b19');
    grad.addColorStop(1, '#0c152b');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < particles.length; i++) {
        let p = particles[i];
        p.y -= p.speed;
        if (p.y < -10) {
            p.y = canvas.height + 10;
            p.x = Math.random() * canvas.width;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(96, 165, 250, ${p.alpha})`;
        ctx.fill();
    }
    requestAnimationFrame(animateBackgroundMesh);
}
animateBackgroundMesh();
